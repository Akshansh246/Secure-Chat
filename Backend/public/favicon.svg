<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5a0" />
      <stop offset="100%" stop-color="#2ff3ad" />
    </linearGradient>
    <linearGradient id="quantum-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0c1ff" />
      <stop offset="100%" stop-color="#8f60fa" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Shield outline -->
  <path d="M50,15 L80,25 C80,55 50,85 50,85 C50,85 20,55 20,25 Z" stroke="url(#shield-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Inner Shield Fill -->
  <path d="M50,15 L80,25 C80,55 50,85 50,85 C50,85 20,55 20,25 Z" fill="#00e5a0" fill-opacity="0.05" />
  <!-- Quantum entangled orbits / chat bubble inside -->
  <circle cx="50" cy="45" r="16" stroke="url(#quantum-grad)" stroke-width="2.5" stroke-dasharray="2 3" />
  <!-- Secure Chat Message Bubble icon -->
  <path d="M43,45 C43,41.1 46.1,38 50,38 C53.9,38 57,41.1 57,45 C57,48.9 53.9,52 50,52 C48.5,52 47.1,51.5 46,50.7 L41,52 L42.3,47.5 C41.5,46.7 41,45.6 41,44.5 Z" fill="url(#shield-grad)" filter="url(#glow)" />
  <!-- Inner lock core dot -->
  <circle cx="50" cy="45" r="2.5" fill="#0e0e11" />
</svg>